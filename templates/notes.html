<!DOCTYPE html>
<html>
<head>
    <title>Notes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <h2>📝 Notes Dashboard</h2>

    <!-- Search -->
    <form method="GET" class="mb-3">
        <input class="form-control" name="search" placeholder="Search notes..." value="{{ search }}">
    </form>

    <p><strong>Total Notes:</strong> {{ total }}</p>

    <!-- Add Note -->
    <form method="POST" class="mb-3">
        <input class="form-control" name="note" placeholder="Enter note">
        <button class="btn btn-success mt-2">Add Note</button>
    </form>

    <!-- Notes List with INLINE EDIT -->
    <ul class="list-group">
        {% for note in notes %}
        <li class="list-group-item">

            <form method="POST" action="/edit/{{ loop.index0 }}" class="d-flex">

                <input type="text" name="note" value="{{ note }}" class="form-control me-2">

                <button class="btn btn-warning btn-sm me-2">Update</button>

                <a href="/delete/{{ loop.index0 }}" class="btn btn-danger btn-sm">Delete</a>

            </form>

        </li>
        {% endfor %}
    </ul>

    <a href="/clear" class="btn btn-danger mt-3">Clear All</a>
    <a href="/" class="btn btn-secondary mt-3">Back</a>

</div>

</body>
</html>
