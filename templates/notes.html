{% extends "base.html" %}

{% block content %}

<div class="d-flex justify-content-between mb-3">
    <h4>Notes</h4>
    <span class="badge bg-primary">Total: {{ total }}</span>
</div>

<form method="GET" class="mb-3 d-flex gap-2">
    <input name="search" class="form-control" placeholder="Search..." value="{{ search }}">
    
    <select name="sort" class="form-select">
        <option value="new">Newest</option>
        <option value="old">Oldest</option>
        <option value="important">Important</option>
    </select>

    <button class="btn btn-secondary">Apply</button>
</form>

<form method="POST" class="mb-4">
    <input name="note" class="form-control" placeholder="Enter note">
    <button class="btn btn-success mt-2 w-100">Add</button>
</form>

<div class="row">
{% for i, note in notes %}
<div class="col-md-6 mb-3">
    <div class="card p-3">

        <form method="POST" action="/edit/{{ i }}">
            <input class="form-control mb-2" name="note" value="{{ note.text }}">
            <small class="text-muted">{{ note.format_time() }}</small>

            <div class="d-flex justify-content-between mt-2">
                <div>
                    <button class="btn btn-warning btn-sm">Update</button>
                    <a href="/important/{{ i }}" class="btn btn-sm {% if note.important %}btn-success{% else %}btn-outline-secondary{% endif %}">
                        Mark
                    </a>
                </div>

                <div>
                    <button type="button" onclick="copyText('{{ note.text }}')" class="btn btn-info btn-sm">Copy</button>
                    <a href="/delete/{{ i }}" class="btn btn-danger btn-sm">Delete</a>
                </div>
            </div>
        </form>

    </div>
</div>
{% endfor %}
</div>

<a href="/clear" class="btn btn-danger w-100 mt-3">Clear All</a>

{% endblock %}
