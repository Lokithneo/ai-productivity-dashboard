<!DOCTYPE html>
<html>
<head>
    <title>Notes Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }
        .card {
            border-radius: 15px;
        }
        .note-input {
            border-radius: 10px;
        }
        .note-item {
            border-radius: 10px;
            transition: 0.2s;
        }
        .note-item:hover {
            transform: scale(1.02);
            background: #f8f9fa;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark shadow">
    <div class="container">
        <span class="navbar-brand fw-bold">
            <i class="bi bi-journal-text"></i> Notes App
        </span>
        <a href="/" class="btn btn-outline-light btn-sm">Home</a>
    </div>
</nav>

<div class="container mt-4">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="fw-bold">📝 Dashboard</h3>
        <span class="badge bg-primary fs-6">Total: {{ total }}</span>
    </div>

    <!-- Search -->
    <form method="GET" class="mb-3">
        <div class="input-group">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input class="form-control" name="search" placeholder="Search notes..." value="{{ search }}">
        </div>
    </form>

    <!-- Add Note -->
    <div class="card shadow-sm p-3 mb-4">
        <form method="POST">
            <input class="form-control note-input" name="note" placeholder="Write a new note...">
            <button class="btn btn-success mt-2 w-100">
                <i class="bi bi-plus-circle"></i> Add Note
            </button>
        </form>
    </div>

    <!-- Notes List -->
    <div class="row">
        {% for note in notes %}
        <div class="col-md-6 mb-3">
            <div class="card note-item p-3 shadow-sm">

                <form method="POST" action="/edit/{{ loop.index0 }}">
                    <input type="text" name="note" value="{{ note }}" class="form-control mb-2">

                    <div class="d-flex justify-content-between">
                        <button class="btn btn-warning btn-sm">
                            <i class="bi bi-pencil"></i> Update
                        </button>

                        <a href="/delete/{{ loop.index0 }}" class="btn btn-danger btn-sm">
                            <i class="bi bi-trash"></i>
                        </a>
                    </div>
                </form>

            </div>
        </div>
        {% endfor %}
    </div>

    <!-- Actions -->
    <div class="text-center mt-3">
        <a href="/clear" class="btn btn-outline-danger">
            <i class="bi bi-x-circle"></i> Clear All
        </a>
    </div>

</div>

</body>
</html>
