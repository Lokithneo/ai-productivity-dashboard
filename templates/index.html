<!DOCTYPE html>
<html>
<head>
    <title>Login Page </title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            text-align: center;
            margin-top: 100px;
        }
        .box {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 15px;
            display: inline-block;
        }
        input, button {
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin: 10px;
        }
        button {
            background: #ff7eb3;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>Login Page </h1>

    <form method="POST">
        <input type="text" name="name" placeholder="Enter your name" required>
        <br>
        <button type="submit">Submit</button>
    </form>

    {% if result %}
        <h2>{{ result }}</h2>
    {% endif %}
</div>

</body>
</html>
